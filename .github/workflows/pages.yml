name: pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: "pages"
  # Only the latest commit needs publishing; cancelling superseded runs avoids
  # competing Pages deployments that fail with "Deployment failed, try again later".
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url || steps.deployment_retry.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install uv
        run: python -m pip install uv

      - name: Install dependencies
        run: uv sync --locked --dev

      - name: Regenerate deterministic eval reports
        run: uv run python scripts/run_all_evals.py

      - name: Build public site
        run: uv run python scripts/build_public_site.py

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      # The Pages backend occasionally returns a transient "try again later" even
      # after the artifact uploads cleanly. Give it a moment and retry once.
      - name: Wait before deploy retry
        if: failure() && steps.deployment.conclusion == 'failure'
        run: sleep 45

      - name: Deploy to GitHub Pages (retry)
        if: failure() && steps.deployment.conclusion == 'failure'
        id: deployment_retry
        uses: actions/deploy-pages@v4
