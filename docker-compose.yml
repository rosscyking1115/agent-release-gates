services:
  api:
    build: .
    image: agent-release-gates:local
    ports:
      - "8000:8000"
    command:
      - uv
      - run
      - --no-dev
      - uvicorn
      - internal_ai_agent.api.main:app
      - --host
      - 0.0.0.0
      - --port
      - "8000"
    healthcheck:
      test:
        - CMD-SHELL
        - python -c "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3).read()"
      interval: 10s
      timeout: 5s
      retries: 5

  dashboard:
    image: agent-release-gates:local
    build: .
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "8510:8510"
    command:
      - uv
      - run
      - --no-dev
      - streamlit
      - run
      - streamlit_app.py
      - --server.address
      - 0.0.0.0
      - --server.port
      - "8510"
      - --server.headless
      - "true"

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.104.0
    profiles:
      - observability
    command:
      - --config=/etc/otelcol/config.yaml
    ports:
      - "4318:4318"
      - "13133:13133"
      - "8888:8888"
    volumes:
      - ./ops/otel-collector-config.yaml:/etc/otelcol/config.yaml:ro
