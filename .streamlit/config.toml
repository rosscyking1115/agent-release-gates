[browser]
gatherUsageStats = false

# Professional, conservative dark palette for a safety/governance review tool.
# Semantic green/red/yellow map onto ship / block / warn gate statuses.
[theme]
base = "dark"
primaryColor = "#60A5FA"             # Bright blue for dark mode
backgroundColor = "#0F172A"          # Deep slate
secondaryBackgroundColor = "#1E293B" # Slightly lighter slate
codeBackgroundColor = "#1E293B"
textColor = "#F1F5F9"
linkColor = "#60A5FA"
borderColor = "#334155"
codeTextColor = "#CBD5E1"
showWidgetBorder = true
showSidebarBorder = true
baseRadius = "6px"
buttonRadius = "6px"

font = "'Inter':https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
headingFont = "'Inter':https://fonts.googleapis.com/css2?family=Inter:wght@600;700&display=swap"
codeFont = "'JetBrains Mono':https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap"
baseFontSize = 14
baseFontWeight = 400
codeFontSize = "13px"
headingFontSizes = ["28px", "22px", "18px", "16px", "14px", "12px"]
headingFontWeights = [700, 600, 600, 600, 500, 500]
linkUnderline = false

# Semantic colors (ship / block / warn / alert / info / accent / neutral)
greenColor = "#34D399"
redColor = "#F87171"
yellowColor = "#FBBF24"
orangeColor = "#FB923C"
blueColor = "#60A5FA"
violetColor = "#A78BFA"
grayColor = "#94A3B8"

chartCategoricalColors = [
    "#60A5FA",
    "#34D399",
    "#A78BFA",
    "#F87171",
    "#FBBF24",
    "#38BDF8",
    "#94A3B8",
    "#FB923C",
]

chartSequentialColors = [
    "#0C4A6E",
    "#075985",
    "#0369A1",
    "#0284C7",
    "#0EA5E9",
    "#38BDF8",
    "#7DD3FC",
    "#BAE6FD",
    "#E0F2FE",
    "#F0F9FF",
]

dataframeBorderColor = "#334155"
dataframeHeaderBackgroundColor = "#1E293B"

[theme.sidebar]
backgroundColor = "#0F172A"
secondaryBackgroundColor = "#1E293B"
codeBackgroundColor = "#1E293B"
textColor = "#F1F5F9"
borderColor = "#334155"
primaryColor = "#60A5FA"
